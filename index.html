<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页UI设计</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e7f3fe;
            border-left: 4px solid #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>数字比较工具</h1>
        <form id="numberForm">
            <div class="input-group">
                <label for="num1">第一个数字:</label>
                <input type="number" id="num1" required>
            </div>
            <div class="input-group">
                <label for="num2">第二个数字:</label>
                <input type="number" id="num2" required>
            </div>
            <div class="input-group">
                <label for="num3">第三个数字:</label>
                <input type="number" id="num3" required>
            </div>
            <div class="input-group">
                <label for="num4">第四个数字:</label>
                <input type="number" id="num4" required>
            </div>
            <button type="submit">比较数字</button>
        </form>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('numberForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const num3 = parseFloat(document.getElementById('num3').value);
            const num4 = parseFloat(document.getElementById('num4').value);
            
            const numbers = [num1, num2, num3, num4];
            const sorted = [...numbers].sort((a, b) => a - b);
            const max = Math.max(...numbers);
            const min = Math.min(...numbers);
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <p><strong>从小到大排序:</strong> ${sorted.join(', ')}</p>
                <p><strong>最大的是:</strong> ${max}</p>
                <p><strong>最小的是:</strong> ${min}</p>
            `;
            resultDiv.style.display = 'block';
        });
    </script>
</body>
</html>
